apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortress-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fortress-llm
  template:
    metadata:
      labels:
        app: fortress-llm
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: llm
          image: fortress-llm
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: ollama
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "16Gi"
              cpu: "8"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 20
