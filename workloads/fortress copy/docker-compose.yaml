services:
  ollama:
    build:
      context: ./llm/app
      dockerfile: Dockerfile
    container_name: fortress-llm
    ports:
      - "11434:11434"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  api:
    build:
      context: ./api/app
      dockerfile: Dockerfile
    container_name: fortress-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=moondream
      - UPLOAD_DIR=/app/uploads
    volumes:
      - fortress-uploads:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/app
      dockerfile: Dockerfile
    container_name: fortress-ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  fortress-uploads:
